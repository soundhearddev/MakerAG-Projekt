<!-- Google Fonts -->
<link rel="stylesheet" href="/styles/header.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">


</head>

<body>

  <header role="banner" class="site-header">
    <div class="head">

      <canvas id="canvas"></canvas>

      <div id="maker" class="title">
        <h1>Maker AG</h1>
      </div>

    </div>
  </header>




  <script>

    const DEV_PIPES_OVER_TITLE = false;


    (function initHeader() {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const head = document.querySelector(".head");
      const maker = document.getElementById("maker");

      if (!canvas || !ctx || !head || !maker) {
        console.error("Header-Elemente nicht gefunden");
        return;
      }


      const CONFIG = {
        CELL: 8,
        SPEED: 70,
        PIPE_COUNT: 20,
        TURN_CHANCE: 0.2,
        GLOW_BLUR: 10,
        TRAIL_LIFETIME: 400,
        COLORS: [
          'hsla(358, 100%, 70%, 0.9)',
          'hsla(177,  62%, 60%, 0.9)',
          'hsla( 47, 100%, 71%, 0.9)'
        ],
        SPAWN_MODE: 'edges',
      };
      // ============================================================

      const DIRS = [
        { x: 1, y: 0 },
        { x: -1, y: 0 },
        { x: 0, y: 1 },
        { x: 0, y: -1 }
      ];

      let COLS = 0, ROWS = 0;
      let pipes = [];
      let running = false;
      let lastFrame = 0;
      let animationId = null;
      let frameCount = 0;
      let cells = [];

      // ---- DEV-Schalter sofort anwenden -------------------------
      if (DEV_PIPES_OVER_TITLE) {
        head.classList.add('pipes-over-title');
      }

      // ---- Resize -----------------------------------------------
      function resize() {
        const rect = head.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        COLS = Math.floor(canvas.width / CONFIG.CELL);
        ROWS = Math.floor(canvas.height / CONFIG.CELL);
        cells = new Array(COLS * ROWS).fill(null);
        if (running) ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      window.addEventListener("resize", resize);
      resize();

      function rand(max) { return Math.floor(Math.random() * max); }
      function cellIdx(x, y) { return y * COLS + x; }

      // ---- Pipe -------------------------------------------------
      class Pipe {
        constructor() { this.reset(); }

        reset() {
          if (CONFIG.SPAWN_MODE === 'random') {
            this.x = rand(COLS);
            this.y = rand(ROWS);
          } else {
            const side = rand(4);
            if (side === 0) { this.x = 0; this.y = rand(ROWS); }
            else if (side === 1) { this.x = COLS - 1; this.y = rand(ROWS); }
            else if (side === 2) { this.x = rand(COLS); this.y = 0; }
            else { this.x = rand(COLS); this.y = ROWS - 1; }
          }
          this.dir = DIRS[rand(4)];
          this.color = CONFIG.COLORS[rand(CONFIG.COLORS.length)];
        }

        step() {
          if (Math.random() < CONFIG.TURN_CHANCE) this.dir = DIRS[rand(4)];

          const nx = this.x + this.dir.x;
          const ny = this.y + this.dir.y;

          if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) {
            this.reset();
            return;
          }

          cells[cellIdx(this.x, this.y)] = {
            color: this.color,
            dieAt: frameCount + CONFIG.TRAIL_LIFETIME
          };

          this.x = nx;
          this.y = ny;
        }
      }

      // ---- Render -----------------------------------------------
      function renderCells() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < cells.length; i++) {
          const cell = cells[i];
          if (!cell) continue;

          const remaining = cell.dieAt - frameCount;
          if (remaining <= 0) { cells[i] = null; continue; }

          const alpha = Math.min(remaining / (CONFIG.TRAIL_LIFETIME * 0.4), 1);
          const x = (i % COLS) * CONFIG.CELL;
          const y = Math.floor(i / COLS) * CONFIG.CELL;
          const baseColor = cell.color.replace(/[\d.]+\)$/, `${alpha.toFixed(3)})`);

          ctx.fillStyle = baseColor;
          ctx.shadowBlur = CONFIG.GLOW_BLUR * alpha;
          ctx.shadowColor = baseColor;
          ctx.fillRect(x, y, CONFIG.CELL, CONFIG.CELL);
        }

        ctx.shadowBlur = 0;
      }

      // ---- Start ------------------------------------------------
      function startPipes() {
        if (running) return;
        running = true;
        frameCount = 0;
        cells = new Array(COLS * ROWS).fill(null);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pipes = Array.from({ length: CONFIG.PIPE_COUNT }, () => new Pipe());
        lastFrame = performance.now();
      }

      maker.addEventListener("click", startPipes);

      // ---- Loop -------------------------------------------------
      function loop(ts) {
        if (running && ts - lastFrame > CONFIG.SPEED) {
          pipes.forEach(p => p.step());
          frameCount++;
          lastFrame = ts;
        }
        renderCells();
        animationId = requestAnimationFrame(loop);
      }

      animationId = requestAnimationFrame(loop);

      window.addEventListener("beforeunload", () => {
        if (animationId) cancelAnimationFrame(animationId);
      });

      // ============================================================
      //  SETTINGS-PANEL ANBINDUNG
      // ============================================================
      function bindSetting(id, configKey, transform, displayFn, onApply) {
        const el = document.getElementById(id);
        if (!el) return;
        const valEl = document.getElementById(id + '-val');
        el.addEventListener('input', () => {
          const v = transform(el.value);
          CONFIG[configKey] = v;
          if (valEl) valEl.textContent = displayFn ? displayFn(v) : v;
          if (onApply) onApply(v);
        });
      }

      bindSetting('pipe-count', 'PIPE_COUNT', v => parseInt(v), null, v => {
        while (pipes.length < v) pipes.push(new Pipe());
        pipes.length = v;
      });
      bindSetting('pipe-speed', 'SPEED', v => parseInt(v), v => v + ' ms');
      bindSetting('pipe-cell', 'CELL', v => parseInt(v), v => v + ' px', () => {
        COLS = Math.floor(canvas.width / CONFIG.CELL);
        ROWS = Math.floor(canvas.height / CONFIG.CELL);
        cells = new Array(COLS * ROWS).fill(null);
        pipes.forEach(p => p.reset());
      });
      bindSetting('pipe-turn', 'TURN_CHANCE', v => parseInt(v) / 100, v => Math.round(v * 100) + ' %');
      bindSetting('pipe-lifetime', 'TRAIL_LIFETIME', v => parseInt(v));
      bindSetting('pipe-glow', 'GLOW_BLUR', v => parseInt(v));

      const spawnEl = document.getElementById('pipe-spawn');
      if (spawnEl) {
        spawnEl.addEventListener('change', () => {
          CONFIG.SPAWN_MODE = spawnEl.value;
          pipes.forEach(p => p.reset());
        });
      }

      // "Richtiger Titel" Toggle aus dem Settings-Panel
      document.addEventListener('change', (e) => {
        if (e.target.id !== 'REAL-mode') return;
        head.classList.toggle('pipes-over-title', e.target.checked);
      });

      // Checkbox-Startzustand setzen sobald Settings-Partial geladen ist
      const chkObserver = new MutationObserver(() => {
        const chk = document.getElementById('REAL-mode');
        if (chk) {
          chk.checked = DEV_PIPES_OVER_TITLE;
          chkObserver.disconnect();
        }
      });
      chkObserver.observe(document.body, { childList: true, subtree: true });

    })();



    

  </script>
